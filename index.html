<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registrasi Calon Investor</title>
    <link rel="stylesheet" href="style.css">
</head>

</head>
<body>

    <div class="container">
        <h2>Registrasi Calon Investor</h2>

        <form>
            <label>Email</label>
            <input type="email" placeholder="Contoh: nama@email.com">
            <label>Password</label>
            <input type="password" placeholder="Minimal 6 karakter (jangan 123456)">

            <label>Jenis Kelamin</label>
                <div class="radio-group">
                    <label><input type="radio" name="jk"> Laki-laki</label>
                    <label><input type="radio" name="jk"> Perempuan</label>
                </div>

            <label>Nama Calon Milyarder 7 Turunan</label>
            <input type="text" placeholder="Masukkan nama">

            <label>Tanggal Lahir</label>
            <input type="date" placeholder="Masukkan tanggal lahir bos">

            <label>Modal Awal (Rp)</label>
            <input type="number" placeholder="Contoh: 1000000">

            <label>Jenis Investasi Favorit</label>
            <select>
                <option>Saham</option>
                <option>Crypto</option>
                <option>Reksadana</option>
                <option>Obligasi</option>
                <option>Deposito</option>
                <option>Properti</option>
            </select>

            <label>Risk Tolerance</label>
            <input type="range" min="1" max="10">

            <label class="check-item">
            <input type="checkbox">
                Siap miskin dulu demi kaya nanti
            </label>

            <button type="submit">Daftar</button>
        </form>
    </div>

</body>
</html>
